<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TACT — כרטיסי אשראי</title>
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23FAF9F5"/><text x="32" y="42" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-weight="700" font-size="28" fill="%231F3A5F">T</text><circle cx="50" cy="22" r="6" fill="%23D64A2E"/></svg>'>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <span class="mark">T<span class="d"></span>A<span class="d"></span>C<span class="d"></span>T</span>
      <span class="word">bank account</span>
    </a>
    <div class="header-spacer"></div>
    <div id="user-chip"></div>
  </div>
</header>

<main class="wrap">
  <a href="/" class="back-link">← חזרה לכל החשבונות</a>

  <div class="page-head">
    <div class="eyebrow"><b></b>CREDIT CARDS</div>
    <h1>כרטיסי <span class="acc">אשראי</span></h1>
    <p class="sub">פירוט חיובי כרטיסי אשראי מהבנקים, נקלט לפריוריטי כדף בנק חודשי לכל כרטיס.</p>
    <div style="display:flex; gap:10px; margin-top:20px; flex-wrap:wrap;">
      <button class="btn btn-pri" id="sync-discount-btn">↓ סנכרן כרטיסי דיסקונט</button>
      <button class="btn btn-pri" id="sync-poalim-btn">↓ סנכרן כרטיסי פועלים</button>
      <button class="btn btn-push" id="push-all-priority-btn">↑ קלוט את כל הכרטיסים לפריוריטי</button>
    </div>
  </div>

  <div id="cards-container">
    <p class="empty" style="padding: 32px;">טוען…</p>
  </div>
</main>

<div class="sync-panel" id="sync-panel">
  <div class="head">
    <h3 id="sync-title">סנכרון כרטיסי אשראי</h3>
    <button class="close" id="sync-close" aria-label="סגירה">✕</button>
  </div>
  <div class="progress-bar"><i></i></div>
  <div class="sync-log" id="sync-log"></div>
</div>

<footer>
  <div class="wrap">© TACT · BANK ACCOUNT DASHBOARD</div>
</footer>

<script src="/credit-cards.js"></script>
</body>
</html>
